<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Nexus Signal</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #07111f;
      --panel: #0c1a2c;
      --panel-2: #12243b;
      --border: #1d3c61;
      --text: #d6e8ff;
      --muted: #6f8fb1;
      --accent: #37c8ff;
      --green: #00e58b;
      --red: #ff5c72;
      --yellow: #ffcf4a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at top right, rgba(55, 200, 255, 0.12), transparent 28%),
        linear-gradient(180deg, #050b14 0%, var(--bg) 100%);
      color: var(--text);
      font-family: "Rajdhani", sans-serif;
    }

    .app {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      background: rgba(7, 17, 31, 0.88);
      backdrop-filter: blur(8px);
    }

    .brand-title {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 3px;
    }

    .brand-sub {
      color: var(--muted);
      font-family: "Share Tech Mono", monospace;
      font-size: 10px;
      letter-spacing: 2px;
    }

    .header-side {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .pill,
    .stat,
    .btn {
      border: 1px solid var(--border);
      background: var(--panel);
      border-radius: 4px;
      padding: 8px 12px;
    }

    .pill,
    .stat {
      font-family: "Share Tech Mono", monospace;
      font-size: 11px;
    }

    .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--muted);
      margin-right: 6px;
    }

    .dot.green { background: var(--green); box-shadow: 0 0 10px rgba(0, 229, 139, 0.6); }
    .dot.red { background: var(--red); box-shadow: 0 0 10px rgba(255, 92, 114, 0.6); }

    .stat strong {
      color: var(--accent);
      margin-right: 6px;
    }

    .btn {
      cursor: pointer;
      color: var(--text);
      font: inherit;
      font-weight: 700;
      letter-spacing: 1px;
      transition: 0.2s ease;
    }

    .btn:hover { transform: translateY(-1px); }
    .btn-start { color: var(--green); border-color: rgba(0, 229, 139, 0.35); }
    .btn-stop { color: var(--red); border-color: rgba(255, 92, 114, 0.35); }

    main {
      flex: 1;
      padding: 18px;
      display: grid;
      gap: 14px;
    }

    .panel {
      border: 1px solid var(--border);
      background: rgba(12, 26, 44, 0.9);
      border-radius: 8px;
      overflow: hidden;
    }

    .panel-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border-bottom: 1px solid rgba(29, 60, 97, 0.7);
      background: linear-gradient(90deg, rgba(55, 200, 255, 0.08), transparent);
    }

    .panel-title {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 1px;
    }

    .panel-sub {
      color: var(--muted);
      font-family: "Share Tech Mono", monospace;
      font-size: 10px;
    }

    .top-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 12px;
      padding: 14px;
    }

    .top-item,
    .card {
      border: 1px solid rgba(29, 60, 97, 0.85);
      background: var(--panel);
      border-radius: 8px;
      padding: 12px;
    }

    .top-item.empty {
      color: var(--muted);
      min-height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-family: "Share Tech Mono", monospace;
    }

    .top-item-head,
    .card-head {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: flex-start;
      margin-bottom: 10px;
    }

    .rank,
    .badge,
    .score {
      font-family: "Share Tech Mono", monospace;
      font-size: 10px;
    }

    .rank { color: var(--yellow); }
    .score {
      color: var(--accent);
      border: 1px solid rgba(55, 200, 255, 0.24);
      border-radius: 999px;
      padding: 3px 7px;
    }

    .symbol {
      font-size: 24px;
      font-weight: 700;
      line-height: 1;
    }

    .pair {
      color: var(--muted);
      font-family: "Share Tech Mono", monospace;
      font-size: 10px;
      margin-top: 3px;
    }

    .levels,
    .meta {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px 12px;
    }

    .label {
      display: block;
      color: var(--muted);
      font-family: "Share Tech Mono", monospace;
      font-size: 9px;
      margin-bottom: 3px;
    }

    .value {
      font-family: "Share Tech Mono", monospace;
      font-size: 12px;
    }

    .value.target { color: var(--green); }
    .value.stop { color: var(--red); }

    .mosaic {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 12px;
      padding: 14px;
    }

    .card.best {
      border-color: rgba(255, 207, 74, 0.9);
      box-shadow: 0 0 0 1px rgba(255, 207, 74, 0.25), 0 0 22px rgba(255, 207, 74, 0.12);
    }

    .badge {
      border: 1px solid rgba(29, 60, 97, 0.8);
      padding: 3px 7px;
      border-radius: 999px;
      color: var(--muted);
    }

    .badge.long {
      color: var(--green);
      border-color: rgba(0, 229, 139, 0.35);
    }

    .badge.none {
      color: var(--muted);
    }

    .price {
      font-family: "Share Tech Mono", monospace;
      font-size: 18px;
      color: var(--accent);
      margin-bottom: 10px;
    }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px 10px;
      margin-bottom: 10px;
    }

    .card-time {
      color: var(--muted);
      font-family: "Share Tech Mono", monospace;
      font-size: 10px;
      margin-top: 10px;
    }

    .status-bar {
      border-top: 1px solid var(--border);
      background: rgba(7, 17, 31, 0.92);
      color: var(--muted);
      font-family: "Share Tech Mono", monospace;
      font-size: 10px;
      padding: 10px 18px;
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
    }

    @media (max-width: 720px) {
      header { align-items: flex-start; }
      .header-side { justify-content: flex-start; }
      .top-list, .mosaic { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div>
        <div class="brand-title">NEXUS SIGNAL</div>
        <div class="brand-sub">SWING DASHBOARD · CRYPTO</div>
      </div>
      <div class="header-side">
        <div class="pill"><span class="dot" id="dot-conn"></span><span id="lbl-conn">DESCONECTADO</span></div>
        <div class="pill"><span class="dot" id="dot-run"></span><span id="lbl-run">PARADO</span></div>
        <div class="stat"><strong id="cnt-total">0</strong>SINAIS</div>
        <div class="stat"><strong id="cnt-long">0</strong>LONG</div>
        <div class="stat"><strong id="cnt-short">0</strong>SHORT</div>
        <button class="btn btn-start" id="btn-start" onclick="doStart()">INICIAR</button>
        <button class="btn btn-stop" id="btn-stop" onclick="doStop()" style="display:none">PARAR</button>
      </div>
    </header>

    <main>
      <section class="panel">
        <div class="panel-head">
          <div class="panel-title">Top 5 Swing Agora</div>
          <div class="panel-sub" id="top-strip-sub">Aguardando sinais validos</div>
        </div>
        <div class="top-list" id="top-list"></div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <div class="panel-title">Mosaico de Ativos</div>
          <div class="panel-sub">Somente setups de swing com alvo fixo</div>
        </div>
        <div class="mosaic" id="mosaic"></div>
      </section>
    </main>

    <div class="status-bar">
      <span>WS <span id="lbl-ws">--</span></span>
      <span>ATIVOS <span id="lbl-count">0</span></span>
      <span>TIMEFRAME <span id="lbl-tf">--</span></span>
      <span id="lbl-status">Aguardando conexao...</span>
    </div>
  </div>

  <script>
    const SYMBOLS = [
      "BTCUSDT","ETHUSDT","XRPUSDT","SOLUSDT","ADAUSDT",
      "XLMUSDT","LINKUSDT","HBARUSDT","BCHUSDT","AVAXUSDT",
      "LTCUSDT","DOTUSDT","UNIUSDT","AAVEUSDT","NEARUSDT",
      "ETCUSDT","ALGOUSDT","ATOMUSDT","POLUSDT","ARBUSDT",
      "QNTUSDT","TIAUSDT","OPUSDT","IMXUSDT","GRTUSDT",
      "LDOUSDT","XTZUSDT",
    ];

    const state = {
      connected: false,
      running: false,
      signals: {},
      prices: {},
      prevPrices: {},
      stats: { totalSignals: 0, longSignals: 0, shortSignals: 0 },
      topOpportunities: [],
      timeframe: "4h",
    };

    let ws = null;
    let bestSymbol = null;

    function ticker(sym) {
      return String(sym || "").replace(/USDT$/i, "");
    }

    function formatPrice(sym, price) {
      if (!price) return "---";
      const value = Number(price);
      if (value >= 1000) return "$" + value.toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      if (value >= 1) return "$" + value.toFixed(4);
      return "$" + value.toFixed(6);
    }

    function relTime(iso) {
      if (!iso) return "";
      const diffMin = Math.floor((Date.now() - new Date(iso).getTime()) / 60000);
      if (diffMin < 1) return "agora";
      if (diffMin < 60) return `ha ${diffMin}m`;
      const h = Math.floor(diffMin / 60);
      const m = diffMin % 60;
      return `ha ${h}h${m ? ` ${m}m` : ""}`;
    }

    function setStatus(message) {
      document.getElementById("lbl-status").textContent = message;
    }

    function setDot(id, active) {
      const el = document.getElementById(id);
      el.className = "dot" + (active ? " green" : "");
    }

    function updateRunUI() {
      setDot("dot-run", state.running);
      document.getElementById("lbl-run").textContent = state.running ? "RODANDO" : "PARADO";
      document.getElementById("btn-start").style.display = state.running ? "none" : "";
      document.getElementById("btn-stop").style.display = state.running ? "" : "none";
    }

    function updateStats(stats) {
      if (stats) Object.assign(state.stats, stats);
      document.getElementById("cnt-total").textContent = state.stats.totalSignals || 0;
      document.getElementById("cnt-long").textContent = state.stats.longSignals || 0;
      document.getElementById("cnt-short").textContent = state.stats.shortSignals || 0;
    }

    function buildMosaic() {
      const host = document.getElementById("mosaic");
      host.innerHTML = "";
      for (const sym of SYMBOLS) {
        const card = document.createElement("div");
        card.className = "card";
        card.id = `card-${sym}`;
        card.innerHTML = cardHTML(sym, null, null, false);
        host.appendChild(card);
      }
      document.getElementById("lbl-count").textContent = SYMBOLS.length;
      renderTopOpportunities();
    }

    function topOpportunityHTML(signal, index) {
      if (!signal) {
        return '<div class="top-item empty">Nenhum setup LONG confirmado no momento.</div>';
      }
      const targetPct = Number(signal.targetPct || 0).toFixed(1);
      const rr = signal.riskReward != null ? `${Number(signal.riskReward).toFixed(2)}x` : "--";
      return `
        <div class="top-item">
          <div class="top-item-head">
            <div>
              <div class="rank">#${index + 1} SWING</div>
              <div class="symbol">${ticker(signal.symbol)}</div>
              <div class="pair">${signal.symbol}</div>
            </div>
            <div class="score">${signal.score || 0}/${signal.maxScore || 10}</div>
          </div>
          <div class="levels">
            <div><span class="label">ENTRADA</span><span class="value">${formatPrice(signal.symbol, signal.price)}</span></div>
            <div><span class="label">VENDER +${targetPct}%</span><span class="value target">${formatPrice(signal.symbol, signal.takeProfit)}</span></div>
            <div><span class="label">STOP</span><span class="value stop">${formatPrice(signal.symbol, signal.stopLoss)}</span></div>
            <div><span class="label">SETUP</span><span class="value">${signal.confidence || "--"}</span></div>
          </div>
          <div class="meta" style="margin-top:10px;">
            <div><span class="label">R/R</span><span class="value">${rr}</span></div>
            <div><span class="label">ATUALIZADO</span><span class="value">${relTime(signal.time)}</span></div>
          </div>
        </div>
      `;
    }

    function renderTopOpportunities() {
      const host = document.getElementById("top-list");
      const label = document.getElementById("top-strip-sub");
      const items = Array.isArray(state.topOpportunities) ? state.topOpportunities.slice(0, 5) : [];
      if (!items.length) {
        host.innerHTML = topOpportunityHTML(null, 0);
        label.textContent = "Aguardando sinais validos";
        return;
      }
      host.innerHTML = items.map((signal, index) => topOpportunityHTML(signal, index)).join("");
      label.textContent = `${items.length} setups LONG ativos | melhor: ${items[0].symbol}`;
    }

    function cardHTML(sym, signal, price, isBest) {
      const badgeClass = signal?.signal === "LONG" ? "badge long" : "badge none";
      const badgeLabel = signal?.signal === "LONG" ? "LONG" : "NEUTRO";
      const score = signal?.score != null ? `${signal.score}/${signal.maxScore || 10}` : "--";
      const targetPct = Number(signal?.targetPct || 0).toFixed(1);
      const livePrice = price || signal?.price || null;

      return `
        <div class="card-head">
          <div>
            <div class="symbol">${ticker(sym)}</div>
            <div class="pair">${sym}</div>
          </div>
          <div class="${badgeClass}">${isBest ? "TOP" : badgeLabel}</div>
        </div>
        <div class="price" id="price-${sym}">${formatPrice(sym, livePrice)}</div>
        <div class="info-grid">
          <div><span class="label">SCORE</span><span class="value">${score}</span></div>
          <div><span class="label">CONF</span><span class="value">${signal?.confidence || "--"}</span></div>
          <div><span class="label">STOP</span><span class="value stop">${formatPrice(sym, signal?.stopLoss)}</span></div>
          <div><span class="label">ALVO +${targetPct}%</span><span class="value target">${formatPrice(sym, signal?.takeProfit)}</span></div>
        </div>
        <div class="meta">
          <div><span class="label">R/R</span><span class="value">${signal?.riskReward != null ? `${Number(signal.riskReward).toFixed(2)}x` : "--"}</span></div>
          <div><span class="label">HTF</span><span class="value">${signal?.indicators?.htfBias || "--"}</span></div>
        </div>
        <div class="card-time">${signal?.time ? relTime(signal.time) : "aguardando dados"}</div>
      `;
    }

    function updateCard(sym, signal, price) {
      const card = document.getElementById(`card-${sym}`);
      if (!card) return;
      const isBest = bestSymbol === sym;
      card.className = "card" + (isBest ? " best" : "");
      card.innerHTML = cardHTML(sym, signal, price, isBest);
    }

    function highlightBest() {
      let nextBest = null;
      let nextScore = -1;
      for (const sym of SYMBOLS) {
        const sig = state.signals[sym];
        if (!sig || sig.signal !== "LONG") continue;
        if ((sig.score || 0) > nextScore) {
          nextScore = sig.score || 0;
          nextBest = sym;
        }
      }
      bestSymbol = nextBest;
      for (const sym of SYMBOLS) {
        updateCard(sym, state.signals[sym] || null, state.prices[sym] || null);
      }
      if (nextBest) {
        const best = state.signals[nextBest];
        setStatus(`Melhor swing: ${nextBest} | vender em ${formatPrice(nextBest, best.takeProfit)}`);
      }
    }

    function connect() {
      setStatus("Conectando...");
      ws = new WebSocket(`ws://${location.host}/ws`);

      ws.onopen = () => {
        setDot("dot-ws", true);
        document.getElementById("lbl-ws").textContent = "CONECTADO";
        setStatus("WS conectado");
      };

      ws.onclose = () => {
        setDot("dot-ws", false);
        document.getElementById("lbl-ws").textContent = "RECONECTANDO";
        setStatus("WS desconectado, tentando novamente...");
        setTimeout(connect, 3000);
      };

      ws.onmessage = (event) => {
        try {
          handleMessage(JSON.parse(event.data));
        } catch (_) {}
      };
    }

    function handleMessage(msg) {
      const { type, data } = msg;

      if (type === "connected") {
        state.connected = true;
        setDot("dot-conn", true);
        document.getElementById("lbl-conn").textContent = data.testnet ? "TESTNET" : "LIVE";
      }

      if (type === "connection_status") {
        state.connected = !!data.connected;
        setDot("dot-conn", !!data.connected);
        document.getElementById("lbl-conn").textContent = data.connected ? (data.testnet ? "TESTNET" : "LIVE") : "DESCONECTADO";
      }

      if (type === "bot_status") {
        state.running = !!data.running;
        updateRunUI();
      }

      if (type === "config" && data.timeframe) {
        state.timeframe = data.timeframe;
        document.getElementById("lbl-tf").textContent = String(data.timeframe).toUpperCase();
      }

      if (type === "mosaic_state") {
        state.running = !!data.running;
        updateRunUI();
        updateStats(data.stats);
        state.topOpportunities = Array.isArray(data.topOpportunities) ? data.topOpportunities : [];
        for (const sym of SYMBOLS) {
          if (data.signals?.[sym]) state.signals[sym] = data.signals[sym];
          if (data.prices?.[sym]) state.prices[sym] = data.prices[sym];
        }
        renderTopOpportunities();
        highlightBest();
      }

      if (type === "signal_update" && data.symbol) {
        state.signals[data.symbol] = data;
        state.topOpportunities = Object.values(state.signals)
          .filter((sig) => sig && sig.signal === "LONG")
          .sort((a, b) => {
            if ((b.score || 0) !== (a.score || 0)) return (b.score || 0) - (a.score || 0);
            return (b.riskReward || 0) - (a.riskReward || 0);
          })
          .slice(0, 5);
        renderTopOpportunities();
        highlightBest();
      }

      if (type === "tick" && data.symbol && data.price) {
        state.prices[data.symbol] = data.price;
        updateCard(data.symbol, state.signals[data.symbol] || null, data.price);
      }

      if (type === "state") {
        if (data.running !== undefined) {
          state.running = !!data.running;
          updateRunUI();
        }
        updateStats(data.stats);
        if (data.signals) state.signals = { ...state.signals, ...data.signals };
        if (data.prices) state.prices = { ...state.prices, ...data.prices };
        if (Array.isArray(data.topOpportunities)) state.topOpportunities = data.topOpportunities;
        renderTopOpportunities();
        highlightBest();
      }
    }

    async function doStart() {
      try {
        const response = await fetch("/api/bot/start", { method: "POST" });
        const data = await response.json();
        if (!data.ok) alert(data.msg || data.error || "Falha ao iniciar");
      } catch (error) {
        alert("Erro: " + error.message);
      }
    }

    async function doStop() {
      try {
        await fetch("/api/bot/stop", { method: "POST" });
      } catch (error) {
        alert("Erro: " + error.message);
      }
    }

    setInterval(() => {
      renderTopOpportunities();
      highlightBest();
    }, 30000);

    buildMosaic();
    connect();
  </script>
</body>
</html>
